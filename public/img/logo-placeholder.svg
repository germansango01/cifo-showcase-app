<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 48" fill="none">
  <!-- Violet flower icon -->
  <g transform="translate(4, 4)">
    <!-- Petals -->
    <ellipse cx="20" cy="12" rx="7" ry="10" fill="#6b3fa0" transform="rotate(-30 20 12)" opacity="0.9"/>
    <ellipse cx="20" cy="12" rx="7" ry="10" fill="#8b56c0" transform="rotate(30 20 12)" opacity="0.85"/>
    <ellipse cx="20" cy="12" rx="7" ry="10" fill="#6b3fa0" transform="rotate(90 20 12)" opacity="0.8"/>
    <ellipse cx="20" cy="12" rx="7" ry="10" fill="#a87cd3" transform="rotate(-90 20 12)" opacity="0.75"/>
    <ellipse cx="20" cy="12" rx="7" ry="10" fill="#8b56c0" transform="rotate(150 20 12)" opacity="0.85"/>
    <!-- Center -->
    <circle cx="20" cy="12" r="4" fill="#e8b84b"/>
    <!-- Stem -->
    <path d="M20 22 Q20 32 18 40" stroke="#44276a" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Leaf -->
    <ellipse cx="22" cy="34" rx="5" ry="2.5" fill="#44276a" transform="rotate(-20 22 34)" opacity="0.6"/>
  </g>
  <!-- Text -->
  <text x="52" y="22" font-family="Plus Jakarta Sans, system-ui, sans-serif" font-size="16" font-weight="800" fill="#1a1722">
    CIFO
  </text>
  <text x="52" y="40" font-family="Plus Jakarta Sans, system-ui, sans-serif" font-size="11" font-weight="500" fill="#7a7588" letter-spacing="0.08em">
    LA VIOLETA
  </text>
</svg>
